openapi: 3.0.3
info:
  title: Product Service API
  description: RS School AWS Course - Modules 3 & 4 - Product Service (DynamoDB)
  version: 1.1.0
servers:
  - url: https://{apiId}.execute-api.{region}.amazonaws.com/dev
    variables:
      apiId:
        default: replace-with-deployed-api-id
      region:
        default: eu-west-1
paths:
  /products:
    get:
      summary: Get all products
      operationId: getProductsList
      responses:
        "200":
          description: A list of available products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AvailableProduct"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
    post:
      summary: Create a new product (with stock count)
      operationId: createProduct
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProductInput"
      responses:
        "201":
          description: Product created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AvailableProduct"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
  /products/{productId}:
    get:
      summary: Get a product by id
      operationId: getProductsById
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Single product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AvailableProduct"
        "400":
          description: Invalid product id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "404":
          description: Product not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
  /import:
    get:
      summary: Get a presigned PUT URL to upload a CSV into the import bucket
      description: |
        Returns a short-lived (60s) S3 presigned PUT URL. The client should
        PUT the raw CSV file body to that URL. The object will be created at
        `uploaded/<name>` in the import bucket and trigger the parser Lambda.
      operationId: importProductsFile
      parameters:
        - name: name
          in: query
          required: true
          description: The CSV file name (must end with `.csv`)
          schema:
            type: string
            pattern: "^[A-Za-z0-9._-]+\\.csv$"
      responses:
        "200":
          description: A presigned PUT URL (string body)
          content:
            application/json:
              schema:
                type: string
        "400":
          description: Missing or invalid `name` parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
components:
  schemas:
    Product:
      type: object
      required: [id, title, description, price]
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        price:
          type: number
    AvailableProduct:
      allOf:
        - $ref: "#/components/schemas/Product"
        - type: object
          required: [count]
          properties:
            count:
              type: integer
              minimum: 0
    ErrorMessage:
      type: object
      properties:
        message:
          type: string
    CreateProductInput:
      type: object
      required: [title, price, count]
      properties:
        title:
          type: string
          minLength: 1
        description:
          type: string
        price:
          type: number
          minimum: 0
        count:
          type: integer
          minimum: 0
